<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.Rm19 TV Streaming Indonesia</title>
    <style>
        /* Desain Dasar Global */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* Bagian Header/Navigasi */
        header {
            background-color: #161b22;
            padding: 20px;
            border-bottom: 2px solid #21262d;
        }
        header h1 {
            margin: 0;
            font-size: 28px;
            color: #58a6ff;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }
        header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #8b949e;
        }
        header a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: bold;
        }
        header a:hover {
            text-decoration: underline;
        }

        /* Kontainer Utama */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 15px;
        }

        h2 {
            margin-top: 0;
            color: #58a6ff;
            font-size: 20px;
        }
        
        .section-title {
            text-align: left;
            margin-top: 30px;
            margin-bottom: 10px;
            font-size: 16px;
            color: #8b949e;
            border-bottom: 1px solid #21262d;
            padding-bottom: 5px;
        }

        /* Bingkai Pemutar Video (iFrame Player) */
        .player-box {
            width: 100%;
            position: relative;
            padding-bottom: 56.25%; /* Rasio Layar 16:9 */
            height: 0;
            background-color: #000;
            border: 2px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .player-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Grid Daftar Tombol Channel TV */
        .playlist {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-tv {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 12px 8px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-tv:hover {
            background-color: #58a6ff;
            color: #0d1117;
            border-color: #58a6ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(88, 166, 255, 0.4);
        }
        .btn-tv:active {
            transform: translateY(0);
        }

        /* Bagian Footer */
        footer {
            background-color: #161b22;
            padding: 15px;
            margin-top: 50px;
            border-top: 2px solid #21262d;
            font-size: 14px;
            color: #8b949e;
        }
    </style>
</head>

<script>
    function gantiTV(url, name) {
        // Mengubah teks informasi channel di atas video
        document.getElementById('current-channel').innerText = "Memutar: " + name;
        // Mengubah sumber alamat link iFrame player
        document.getElementById('tv-frame').src = url;
